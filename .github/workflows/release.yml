# Workflow for kofany/subterm-releases (PUBLIC repo)
# Builds from private source repo (kofany/subterm), publishes releases here
# PUBLIC repo = unlimited GitHub Actions minutes

name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout from private repo
        uses: actions/checkout@v4
        with:
          repository: kofany/subterm
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          submodules: false

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Workaround hdiutil DMG creation issue on macOS
        if: startsWith(matrix.platform, 'macos')
        run: |
          sudo mdutil -a -i off || true
          sudo killall mds_stores || true

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: ignore

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git rust nodejs \
            webkit2gtk-4.1 gtk3 libsoup3 openssl \
            libappindicator-gtk3 librsvg \
            curl wget file patchelf unzip zstd

      - name: Install Bun
        run: |
          curl -fsSL https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64.zip -o bun.zip
          unzip bun.zip
          mv bun-linux-x64/bun /usr/local/bin/bun
          chmod +x /usr/local/bin/bun
          bun --version

      - name: Checkout from private repo
        uses: actions/checkout@v4
        with:
          repository: kofany/subterm
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          submodules: false

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}

      - name: Build Rust binary
        run: cd src-tauri && cargo build --release

      - name: Create Arch package
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PKG_NAME="subterm-bin-${VERSION}-1-x86_64.pkg.tar.zst"

          mkdir -p pkg/usr/bin pkg/usr/share/applications pkg/usr/share/icons/hicolor/256x256/apps pkg/usr/share/licenses/subterm-bin

          cp src-tauri/target/release/subterm pkg/usr/bin/subterm
          chmod 755 pkg/usr/bin/subterm

          find src-tauri/target/release/bundle -name "*.desktop" -exec cp {} pkg/usr/share/applications/subterm.desktop \; 2>/dev/null || \
            echo -e "[Desktop Entry]\nName=Subterm\nExec=subterm\nIcon=subterm\nType=Application\nCategories=Network;RemoteAccess;" > pkg/usr/share/applications/subterm.desktop
          cp src-tauri/icons/128x128.png pkg/usr/share/icons/hicolor/256x256/apps/subterm.png 2>/dev/null || true

          echo "Subterm is proprietary software. See https://github.com/kofany/subterm-releases" > pkg/usr/share/licenses/subterm-bin/LICENSE

          cat > pkg/.PKGINFO << EOF
          pkgname = subterm-bin
          pkgver = ${VERSION}-1
          pkgbase = subterm-bin
          pkgdesc = Cross-platform SSH and SFTP client with GPU-accelerated terminal rendering
          url = https://github.com/kofany/subterm-releases
          builddate = $(date +%s)
          packager = GitHub Actions
          size = $(du -sb pkg/usr | cut -f1)
          arch = x86_64
          license = custom:proprietary
          depend = webkit2gtk-4.1
          depend = gtk3
          depend = glib2
          depend = gdk-pixbuf2
          depend = cairo
          depend = pango
          depend = libsoup3
          depend = openssl
          depend = hicolor-icon-theme
          optdepend = libappindicator-gtk3: system tray support
          EOF

          cd pkg && tar --zstd -cf "../${PKG_NAME}" .PKGINFO * && cd ..
          mkdir -p output && mv "${PKG_NAME}" output/
          ls -la output/

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Arch-x64
          path: output/*.pkg.tar.zst
          if-no-files-found: error

  publish-release:
    needs: [build, build-arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Subterm ${{ github.ref_name }}'
          body: |
            ## Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Windows | x64 | `.exe` / `.msi` installer |
            | macOS | Apple Silicon (M1/M2/M3/M4) | `.dmg` (aarch64) |
            | macOS | Intel | `.dmg` (x64) |
            | Linux (Ubuntu/Debian) | x64 | `.deb` |
            | Linux (Fedora/RHEL) | x64 | `.rpm` |
            | Linux (Arch/Manjaro) | x64 | `.pkg.tar.zst` |
            | Linux (Universal) | x64 | `.AppImage` |

            ---

            **First time on macOS?** Right-click → Open (bypass Gatekeeper)

            **Arch Linux:**
            ```bash
            sudo pacman -U subterm-bin-*.pkg.tar.zst
            ```

            **Linux AppImage:**
            ```bash
            chmod +x Subterm_*.AppImage
            ./Subterm_*.AppImage
            ```

            See [CHANGELOG.md](https://github.com/kofany/subterm-releases/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.pkg.tar.zst

  update-changelog:
    needs: publish-release
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout private repo (source of commits)
        uses: actions/checkout@v4
        with:
          repository: kofany/subterm
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Generate changelog for this release
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Update CHANGELOG.md in source repo
        run: |
          DATE=$(date +%Y-%m-%d)
          if [ -f CHANGELOG.md ]; then
            head -7 CHANGELOG.md > CHANGELOG.new
            printf '## [%s] - %s\n\n' "${TAG_NAME}" "${DATE}" >> CHANGELOG.new
            cat CHANGES.md >> CHANGELOG.new
            printf '\n' >> CHANGELOG.new
            tail -n +8 CHANGELOG.md >> CHANGELOG.new
            mv CHANGELOG.new CHANGELOG.md
          else
            printf '# Changelog\n\n## [%s] - %s\n\n' "${TAG_NAME}" "${DATE}" > CHANGELOG.md
            cat CHANGES.md >> CHANGELOG.md
          fi

      - name: Commit to private repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md for ${TAG_NAME}"
          git push origin main

      - name: Push CHANGELOG to public repo
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kofany/subterm-releases.git" public-repo
          cp CHANGELOG.md public-repo/
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md for ${TAG_NAME}"
          git push

      - name: Update release body with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${TAG_NAME}" --repo kofany/subterm-releases --notes-file CHANGES.md

  publish-aur:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

      - name: Wait for release assets
        run: sleep 60

      - name: Download and get SHA256
        id: sha256
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          URL="https://github.com/kofany/subterm-releases/releases/download/v${VERSION}/subterm-bin-${VERSION}-1-x86_64.pkg.tar.zst"
          curl -sLO "$URL"
          SHA256=$(sha256sum "subterm-bin-${VERSION}-1-x86_64.pkg.tar.zst" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Generate PKGBUILD
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          cat > PKGBUILD << 'PKGBUILD_EOF'
          # Maintainer: kofany <j@dabrowski.biz>
          pkgname=subterm-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Cross-platform SSH and SFTP client with GPU-accelerated terminal rendering"
          arch=('x86_64')
          url="https://github.com/kofany/subterm-releases"
          license=('custom:proprietary')
          depends=(
              'webkit2gtk-4.1'
              'gtk3'
              'glib2'
              'gdk-pixbuf2'
              'cairo'
              'pango'
              'libsoup3'
              'openssl'
              'hicolor-icon-theme'
          )
          optdepends=(
              'libappindicator-gtk3: system tray support'
              'gst-plugins-good: video/audio support'
          )
          provides=('subterm')
          conflicts=('subterm')
          options=('!strip' '!debug')
          source=("subterm-bin-${pkgver}.pkg.tar.zst::https://github.com/kofany/subterm-releases/releases/download/v${pkgver}/subterm-bin-${pkgver}-1-x86_64.pkg.tar.zst")
          sha256sums=('SKIP')
          noextract=("subterm-bin-${pkgver}.pkg.tar.zst")

          package() {
              cd "${srcdir}"
              bsdtar -xf "subterm-bin-${pkgver}.pkg.tar.zst" -C "${pkgdir}/"
              rm -f "${pkgdir}/.PKGINFO" "${pkgdir}/.BUILDINFO" "${pkgdir}/.MTREE" 2>/dev/null || true
          }
          PKGBUILD_EOF
          sed -i "s/\${VERSION}/${VERSION}/g" PKGBUILD
          sed -i "s/'SKIP'/'${SHA256}'/g" PKGBUILD

      - name: Generate .SRCINFO
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          cat > .SRCINFO << SRCINFO_EOF
          pkgbase = subterm-bin
          	pkgdesc = Cross-platform SSH and SFTP client with GPU-accelerated terminal rendering
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/kofany/subterm-releases
          	arch = x86_64
          	license = custom:proprietary
          	depends = webkit2gtk-4.1
          	depends = gtk3
          	depends = glib2
          	depends = gdk-pixbuf2
          	depends = cairo
          	depends = pango
          	depends = libsoup3
          	depends = openssl
          	depends = hicolor-icon-theme
          	optdepends = libappindicator-gtk3: system tray support
          	optdepends = gst-plugins-good: video/audio support
          	provides = subterm
          	conflicts = subterm
          	options = !strip
          	options = !debug
          	noextract = subterm-bin-${VERSION}.pkg.tar.zst
          	source = subterm-bin-${VERSION}.pkg.tar.zst::https://github.com/kofany/subterm-releases/releases/download/v${VERSION}/subterm-bin-${VERSION}-1-x86_64.pkg.tar.zst
          	sha256sums = ${SHA256}

          pkgname = subterm-bin
          SRCINFO_EOF

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Publish to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --global user.name "kofany"
          git config --global user.email "j@dabrowski.biz"

          git clone ssh://aur@aur.archlinux.org/subterm-bin.git aur-repo
          cd aur-repo
          git checkout -B master origin/master || git checkout -b master

          cp ../PKGBUILD .
          cp ../.SRCINFO .

          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}" || echo "No changes to commit"
          git push origin master
